name: CMake

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  build_and_release:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSYS2 (ucrt64)
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          git
          make
        pacboy: >-
          toolchain:p
          cmake:p

    - name: Verify GCC Installation
      run: |
        gcc --version
        g++ --version

    - name: Update Version & Tag
      id: create_tag
      shell: msys2 {0}
      run: |
        sed -i -E "s/\"FileVersion\", \"[0-9.]+/\"FileVersion\", \"0.0.${{ github.run_number }}.0/g" iRonXtra.rc
        sed -i -E "s/\"ProductVersion\", \"[0-9.]+/\"ProductVersion\", \"0.0.${{ github.run_number }}.0/g" iRonXtra.rc
        sed -i -E "s/FILEVERSION [0-9,]+/FILEVERSION 0,0,${{ github.run_number }},0/g" iRonXtra.rc
        sed -i -E "s/PRODUCTVERSION [0-9,]+/PRODUCTVERSION 0,0,${{ github.run_number }},0/g" iRonXtra.rc
        tag_name="v0.0.${{ github.run_number }}"
        git tag $tag_name
        git push origin $tag_name
        echo "tag=$tag_name" >> $GITHUB_OUTPUT

    - name: Configure CMake
      shell: msys2 {0}
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: cmake -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -S '${{github.workspace}}' -B '${{github.workspace}}\out\build\${{env.BUILD_TYPE}}' -G "MinGW Makefiles"

    - name: CMake Build
      shell: msys2 {0}
      # Build your program with the given configuration
      run: cmake --build '${{github.workspace}}\out\build\${{env.BUILD_TYPE}}' --target iRonXtra --
    
    - name: List directory
      shell: msys2 {0}
      run: ls -a '${{github.workspace}}\out\build\${{env.BUILD_TYPE}}'

    - name: Zip
      uses: thedoctor0/zip-release@0.7.5
      with:
        directory: 'out\build\${{env.BUILD_TYPE}}'
        type: zip
        filename: '${{github.workspace}}\iRonExtra_v0.0.${{ github.run_number }}.zip'
        exclusions: '*make* *Make*'

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.create_tag.outputs.tag }}
        files: iRonExtra_v0.0.${{ github.run_number }}.zip
